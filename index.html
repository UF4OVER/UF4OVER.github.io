<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <!-- 在head部分增加以下meta -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="apple-touch-icon" href="/pic/logo1.jpg">
    <title>我的个人博客</title>
    <!--    设置网页的图标-->
    <link rel="shortcut icon" href="/pic/pic.jpg" type="image/x-icon">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
</head>
<body>
    <div class="cherry-blossom"></div>
    <header class="animate__animated animate__fadeInDown">
        <nav>
            <div class="logo">
                <img src="/pic/logo1.jpg" alt="Logo" class="rotating-logo">
            </div>
            <div id="g-btn"></div>
            <div class="menu-toggle">
                <span><a href="#home" class="nav-link">首页</a></span>
                <span><a href="/blog/blog.html" class="nav-link">博客</a></span>
                <span><a href="/home/gallery.html" class="nav-link">图库</a></span>
            </div>
            <!-- 添加主题切换按钮 -->
            <label class="theme-toggle-label">
                <input type="checkbox" id="themeToggle" class="theme-toggle-checkbox">
                <span class="theme-toggle-slider round"></span> <!-- 添加 round 类以确保样式一致 -->
            </label>
        </nav>
    </header>

    <main>
        <section id="home" class="animate__animated animate__fadeIn">
            <div class="hero">
                <img src="/pic/banner.jpg" alt="Banner" class="banner-img">
                <h1 class="glow-text">欢迎来到我的图床空间</h1>
                <p class="typing-text">这里是充满创意和梦想的天地~</p>
            </div>
        </section>

        <section id="blog" class="card-container">
            <h2 class="section-title">最新文章</h2>
            <div class="blog-cards">
                <article class="blog-card hover-effect">
                    <img src="/pic/blog1.jpg" alt="文章1">
                    <div class="card-content">
                        <h3>我最喜欢的动漫角色</h3>
                        <p>来聊聊那些让我难忘的角色们...</p>
                        <a href="#" class="read-more">阅读更多</a>
                    </div>
                </article>
                <article class="blog-card hover-effect">
                    <img src="/pic/blog2.jpg" alt="文章2">
                    <div class="card-content">
                        <h3>最新番剧推荐</h3>
                        <p>本季度不容错过的作品...</p>
                        <a href="#" class="read-more">阅读更多</a>
                    </div>
                </article>
            </div>
        </section>

        <section id="gallery" class="image-gallery">
            <h2 class="section-title">精美图集</h2>
            <div class="gallery-grid">
                <div class="gallery-item"><img src="/pic/gallery1.jpg" alt="图片1"></div>
                <div class="gallery-item"><img src="/pic/gallery2.jpg" alt="图片2"></div>
                <div class="gallery-item"><img src="/pic/gallery3.jpg" alt="图片3"></div>
            </div>
        </section>
    </main>

    <footer>
        <div class="social-links">
            <a href="https://space.bilibili.com/1000215778?spm_id_from=333.1007.0.0" class="social-icon">B站</a>
            <a href="https://github.com/UF4OVER" class="social-icon">GitHub</a>
        </div>
        <p>&copy; 2024 我的博客 | Made with UF4</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
