<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的二次元博客</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
</head>

<body>
    <div class="cherry-blossom"></div>
    
    <header class="animate__animated animate__fadeInDown">
        <nav>
            <div class="logo">
                <img src="pic/logo.jpg" alt="Logo" class="rotating-logo">
            </div>
            <ul>
                <li><a href="#home" class="nav-link">首页</a></li>
                <li><a href="blog/blog.html" class="nav-link">博客</a></li>
                <li><a href="home/gallery.html" class="nav-link">图库</a></li>
                <li><a href="login/login.html" class="nav-link">登录</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="home" class="animate__animated animate__fadeIn">
            <div class="hero">
                <img src="pic/logo.jpg" alt="Banner" class="banner-img">
                <h1 class="glow-text">欢迎来到我的二次元空间</h1>
                <p class="typing-text">这里是充满创意和梦想的天地~</p>
            </div>
        </section>

        <section id="blog" class="card-container">
            <h2 class="section-title">最新文章</h2>
            <div class="blog-cards">
                <article class="blog-card hover-effect">
                    <img src="pic/blog1.jpg" alt="文章1">
                    <div class="card-content">
                        <h3>我最喜欢的动漫角色</h3>
                        <p>来聊聊那些让我难忘的角色们...</p>
                        <a href="#" class="read-more">阅读更多</a>
                    </div>
                </article>
                <article class="blog-card hover-effect">
                    <img src="pic/blog2.jpg" alt="文章2">
                    <div class="card-content">
                        <h3>最新番剧推荐</h3>
                        <p>本季度不容错过的作品...</p>
                        <a href="#" class="read-more">阅读更多</a>
                    </div>
                </article>
            </div>
        </section>

        <section id="gallery" class="image-gallery">
            <h2 class="section-title">精美图集</h2>
            <div class="gallery-grid">
                <div class="gallery-item"><img src="pic/gallery1.jpg" alt="图片1"></div>
                <div class="gallery-item"><img src="pic/gallery2.jpg" alt="图片2"></div>
                <div class="gallery-item"><img src="pic/gallery3.jpg" alt="图片3"></div>
            </div>
        </section>
    </main>

    <footer>
        <div class="social-links">
            <a href="#" class="social-icon">微博</a>
            <a href="#" class="social-icon">B站</a>
            <a href="#" class="social-icon">GitHub</a>
        </div>
        <p>&copy; 2024 二次元博客 | Made with ❤️</p>
    </footer>
</body>
</html>
