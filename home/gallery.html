<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片画廊</title>
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="gallery.css">
    <!-- 添加 Masonry 库 -->
    <script src="https://unpkg.com/masonry-layout@4/dist/masonry.pkgd.min.js"></script>
    <!-- 添加 imagesLoaded 库以确保图片加载后再布局 -->
    <script src="https://unpkg.com/imagesloaded@5/imagesloaded.pkgd.min.js"></script>
</head>
<body>
    <header>
        <nav>
            <div class="logo">
                <img src="../pic/logo.jpg" alt="Logo" class="rotating-logo">
            </div>
            <ul>
                <li><a href="../index.html" class="nav-link">返回首页</a></li>
            </ul>
            <!-- 添加主题切换按钮 -->
            <label class="theme-toggle-label">
                <input type="checkbox" id="themeToggle" class="theme-toggle-checkbox">
                <span class="theme-toggle-slider round"></span> <!-- 添加 round 类以确保样式一致 -->
            </label>
        </nav>
    </header>

    <div class="gallery-container">
        <div class="gallery-grid" id="gallery-grid">
            <!-- 图片将通过JavaScript动态加载 -->
        </div>
    </div>

    <!-- 图片预览模态框 -->
    <div class="modal" id="imageModal">
        <span class="modal-close">&times;</span>
        <img id="modalImage" src="" alt="预览图片">
    </div>
    <script src="gallery-config.js"></script>
    <script src="gallery.js"></script>
</body>
</html>
