<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>博客</title>
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="blog.css">
    <!-- Markdown解析和代码高亮 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
</head>
<body>
    <header>
        <nav>
            <div class="logo">
                <img src="../pic/logo.jpg" alt="Logo">
            </div>
            <ul>
                <li><a href="../index.html" class="nav-link">返回首页</a></li>
            </ul>
            <!-- 添加主题切换按钮 -->
            <label class="theme-toggle-label">
                <input type="checkbox" id="themeToggle" class="theme-toggle-checkbox">
                <span class="theme-toggle-slider round"></span> <!-- 添加 round 类以确保样式一致 -->
            </label>
        </nav>
    </header>

    <div class="blog-container">
        <!-- 文章列表 -->
        <aside class="article-list">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="搜索文章...">
            </div>
            <div id="fileList" class="file-list">
                <!-- 文章列表将动态加载到这里 -->
            </div>
        </aside>

        <!-- 文章内容 -->
        <main class="article-content">

            <div id="content">
                <div class="welcome-message">
                    <h1>👋 欢迎来到我的博客</h1>
                    <p>请从左侧选择一篇文章开始阅读</p>
                </div>
            </div>
        </main>

        <!-- 文章目录 -->
        <aside class="article-toc">
            <div class="toc-title">目录</div>
            <div id="toc" class="toc-content">
                <!-- 目录将通过JS动态生成 -->
            </div>
        </aside>
    </div>
    <script src="articles-config.js"></script>
    <script src="blog.js"></script>
    <script src="../script.js"></script>
</body>
</html>
