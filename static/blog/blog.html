<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>双端博客展示</title>
    <style>
        /* 基础设置与暗色主题，并增加背景图片 */
        body {
            margin: 0;
            padding: 0;
            background: url('../img/background.jpg') no-repeat center center fixed;
            background-size: cover;
            color: #eee;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden;
            cursor: url('https://cdn.jsdelivr.net/gh/curtze/CustomCursor@main/cursor.cur'), auto;
        }
        /* 桌面端三列布局 */
        .container {
            display: flex;
            height: 100vh;
        }
        .sidebar, .content, .info {
            padding: 20px;
            overflow-y: auto;
        }
        .sidebar {
            width: 20%;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
        }
        .content {
            width: 60%;
            background: rgba(255, 255, 255, 0.03);
        }
        .info {
            width: 20%;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-left: 1px solid rgba(255, 255, 255, 0.1);
        }
        /* 博客标题样式 */
        .blog-title {
            padding: 10px;
            margin: 5px 0;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .blog-title:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        /* 搜索框样式 */
        .search-box {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: none;
            outline: none;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            color: #eee;
        }
        /* 移动端样式 */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }
            #desktopContainer {
                display: none;
            }
            #mobileContainer {
                display: block;
                height: calc(100vh - 50px);
            }
            .navbar {
                display: flex;
                align-items: center;
                padding: 10px;
                background: rgba(255, 255, 255, 0.05);
                backdrop-filter: blur(10px);
            }
            .navbar .menu-btn {
                background: none;
                border: none;
                color: #eee;
                font-size: 20px;
                cursor: pointer;
                margin-right: 10px;
            }
            /* 移动端搜索框样式 */
            .search-box {
                margin: 0 10px;
            }
            /* 隐藏桌面专用的博客列表 */
            #blogListDesktop {
                display: none;
            }
        }
    </style>
</head>
<body>
<!-- 移动端导航栏 -->
<div class="navbar" id="navbar" style="display: none;">
    <button class="menu-btn" onclick="toggleMobileSidebar()">☰</button>
    <input type="text" class="search-box" placeholder="搜索博客标题" id="searchInputMobile" oninput="filterTitlesMobile()">
</div>
<!-- 移动端博客列表侧边栏（默认隐藏） -->
<div id="mobileSidebar" style="display: none; background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); padding: 10px; overflow-y: auto; max-height: 200px;">
    <div id="blogListMobile"></div>
</div>

<!-- 桌面端三列布局 -->
<div class="container" id="desktopContainer">
    <div class="sidebar">
        <input type="text" class="search-box" placeholder="搜索博客标题" id="searchInput" oninput="filterTitlesDesktop()">
        <div id="blogListDesktop"></div>
    </div>
    <div class="content" id="blogContent">
        <p style="text-align:center;">请选择一个博客文章...</p>
    </div>
    <div class="info" id="contentInfo">
        <h2>文章标题</h2>
    </div>
</div>
<!-- 移动端单列布局 -->
<div class="container" id="mobileContainer" style="display: none;">
    <div class="content" id="mobileBlogContent">
        <p style="text-align:center;">请选择一个博客文章...</p>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
    // 判断当前终端类型
    function isMobile() {
        return window.innerWidth <= 768;
    }
    function adjustLayout() {
        if (isMobile()) {
            document.getElementById('desktopContainer').style.display = 'none';
            document.getElementById('mobileContainer').style.display = 'block';
            document.getElementById('navbar').style.display = 'flex';
        } else {
            document.getElementById('desktopContainer').style.display = 'flex';
            document.getElementById('mobileContainer').style.display = 'none';
            document.getElementById('navbar').style.display = 'none';
        }
    }
    window.addEventListener('resize', adjustLayout);
    adjustLayout();

    // 仓库配置信息 —— 请根据实际情况修改
    const repoOwner = 'UF4OVER';  // GitHub 用户名
    const repoName = 'BLOG';     // 仓库名称
    const folderPath = 'markdown';       // 存放 Markdown 文件的文件夹路径

    // 使用 GitHub API 获取指定文件夹下的文件列表
    function fetchBlogList() {
        const apiUrl = `https://api.github.com/repos/${repoOwner}/${repoName}/contents/${folderPath}`;
        console.log(`Fetching blog list from: ${apiUrl}`); // 调试信息
        fetch(apiUrl)
            .then(response => {
                if (!response.ok) {
                    throw new Error(`网络错误，无法获取文件列表。状态码: ${response.status}`);
                }
                return response.json();
            })
            .then(data => {
                console.log('Fetched blog list:', data); // 调试信息
                // 过滤出 .md 文件
                const mdFiles = data.filter(item => item.name.toLowerCase().endsWith('.md'));
                // 保存到全局变量，方便后续使用
                window.blogs = mdFiles;
                loadBlogList(mdFiles);
            })
            .catch(error => {
                console.error(error);
                displayError(`加载博客列表失败：${error.message}`);
            });
    }

    // 加载博客列表到桌面和移动端
    function loadBlogList(blogs) {
        // 桌面端博客列表
        const blogListDesktop = document.getElementById('blogListDesktop');
        blogListDesktop.innerHTML = '';

        blogs.forEach((blog, index) => {
            // 桌面端博客标题
            const divDesktop = document.createElement('div');
            divDesktop.className = 'blog-title';
            divDesktop.textContent = blog.name.replace(/\.md$/, '');
            divDesktop.onclick = () => loadBlogContent(index);
            blogListDesktop.appendChild(divDesktop);
        });
    }

    // 使用 fetch 获取指定 Markdown 文件内容，并转换后展示
    function loadBlogContent(index) {
        const blog = window.blogs[index];
        console.log(`Loading blog content from: ${blog.download_url}`); // 调试信息
        fetch(blog.download_url)
            .then(response => {
                if (!response.ok) {
                    throw new Error(`网络错误，无法获取文章内容。状态码: ${response.status}`);
                }
                return response.text();
            })
            .then(markdownContent => {
                console.log('Markdown content fetched:', markdownContent); // 调试信息
                // 使用 marked.js 将 Markdown 转换为 HTML
                const htmlContent = marked.parse(markdownContent);
                document.getElementById('blogContent').innerHTML = htmlContent;
                document.getElementById('contentInfo').innerHTML = `<h2>${blog.name.replace(/\.md$/, '')}</h2>`;
            })
            .catch(error => {
                console.error(error);
                const errorMsg = `<p style="color: red;">加载文章失败：${error.message}</p>`;
                document.getElementById('blogContent').innerHTML = errorMsg;
                document.getElementById('contentInfo').innerHTML = '';
            });

    }
    // 搜索过滤博客标题 - 桌面端
    function filterTitlesDesktop() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const titles = document.getElementById('blogListDesktop').getElementsByClassName('blog-title');
        Array.from(titles).forEach(titleElem => {
            titleElem.style.display = titleElem.textContent.toLowerCase().includes(query) ? 'block' : 'none';
        });
    }

    // 搜索过滤博客标题 - 移动端
    function filterTitlesMobile() {
        const query = document.getElementById('searchInputMobile').value.toLowerCase();
        const titles = document.getElementById('blogListMobile').getElementsByClassName('blog-title');
        Array.from(titles).forEach(titleElem => {
            titleElem.style.display = titleElem.textContent.toLowerCase().includes(query) ? 'block' : 'none';
        });
    }

    // 移动端侧边栏切换：使用 getComputedStyle 获取真实的显示状态
    function toggleMobileSidebar() {
        const sidebar = document.getElementById('mobileSidebar');
        const currentDisplay = window.getComputedStyle(sidebar).display;
        sidebar.style.display = currentDisplay === 'none' ? 'block' : 'none';
    }

    // 当获取博客列表失败时，在正文中显示错误信息
    function displayError(message) {
        if (isMobile()) {
            document.getElementById('mobileBlogContent').innerHTML = `<p style="color: red;">${message}</p>`;
        } else {
            document.getElementById('blogContent').innerHTML = `<p style="color: red;">${message}</p>`;
            document.getElementById('contentInfo').innerHTML = '';
        }
    }

    // 初次加载博客列表
    fetchBlogList();
</script>
</body>
</html>
